name: Deploy silly.masonlaneous.com

on:
  push:
    paths:
      - apps/silly/**
      - .github/workflows/silly.yaml
      - package.json

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Build Docker image
        run: pnpm run build-silly

      - name: Deploy
        run: docker compose -f /home/runner/docker/docker-compose.yml up -d